version: 2
updates:
- package-ecosystem: "maven"
  directory: "/"
  schedule:
    interval: "monthly"
  cooldown:
    default-days: 7
  open-pull-requests-limit: 10
- package-ecosystem: "maven"
  directory: "/src/test/resources/test-project-exception/"
  schedule:
    interval: "monthly"
  cooldown:
    default-days: 7
  open-pull-requests-limit: 10
- package-ecosystem: "maven"
  directory: "/src/test/resources/test-project-print/"
  schedule:
    interval: "monthly"
  cooldown:
    default-days: 7
  open-pull-requests-limit: 10
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "monthly"
  cooldown:
    default-days: 7
  open-pull-requests-limit: 10
  groups:
    github-codeql-action:
      patterns:
      - "github/codeql-action*"
